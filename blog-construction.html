<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction - Jonah Bernard</title>
    <style>
        :root {
            --text-color: #000000;
            --link-color: #313C52;
            --brand-color: #B58E31;
            --muted-color: #AAADB2;
            --border-color: #dcd8c9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: var(--text-color);
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: baseline;
            padding: 30px 40px;
            font-size: 15px;
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-group {
            display: flex;
            gap: 40px;
        }

        .nav-group a {
            text-decoration: none;
            color: var(--link-color);
            transition: color 0.2s ease;
        }

        .nav-group a:hover {
            color: var(--brand-color);
        }

        .header-name {
            font-size: 20px;
            color: var(--brand-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-group a.active {
            color: var(--brand-color);
        }

        .header-socials {
            justify-self: end;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .header-socials a {
            color: var(--link-color);
            display: inline-flex;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .header-socials a:hover {
            color: var(--brand-color);
            transform: translateY(-2px);
        }

        .header-socials svg {
            width: 18px;
            height: 18px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .construction {
            text-align: center;
        }

        .construction h1 {
            font-size: 48px;
            font-weight: normal;
            margin: 0 0 16px 0;
            color: var(--brand-color);
        }

        .construction p {
            font-size: 18px;
            color: var(--link-color);
            margin: 0;
        }
    </style>
</head>

<body>
    <header>
        <a href="/" class="header-name">Jonah Bernard</a>
        <div class="nav-group">
            <a href="/#about">About</a>

            <a href="/#blog" class="active">Blog</a>
            <a href="/#open-source">Open-Source Contributions</a>
            <a href="/#hobbies">Hobbies</a>

        <div class="header-socials">
