        :root {
            --text-color: #000000;

            --muted-color: #AAADB2;
            --border-color: #dcd8c9;
            --bg-alt: #f5f1e8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: baseline;
            padding: 30px 40px;
            font-size: 15px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .nav-group {
            display: flex;
            gap: 40px;
        }

        .nav-group a {
            text-decoration: none;
            color: var(--link-color);
            transition: color 0.2s ease;
        }

        .nav-group a:hover {
            color: var(--brand-color);
        }

        .header-name {
            font-size: 20px;
            color: var(--brand-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-group a.active {
            color: var(--brand-color);
        }

        .header-socials {
            justify-self: end;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .header-socials a {
            color: var(--link-color);
            display: inline-flex;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .header-socials a:hover {
            color: var(--brand-color);
            transform: translateY(-2px);
        }

        .header-socials svg {
            width: 18px;
            height: 18px;
        }

        main {
            padding: 60px 40px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            line-height: 1.8;
        }

        h1 {
            font-weight: normal;
            font-size: 32px;
            margin: 0 0 20px 0;
        }

        a.back {
            color: var(--brand-color);
            text-decoration: none;
            margin-bottom: 40px;
            display: inline-block;
        }

        a.back:hover {
            text-decoration: underline;
        }

        #detail-content {
            font-size: 17px;
        }

        /* GitHub Embed Styles */
        .github-embed {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid var(--border-color);
        }

        .github-embed h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .github-body {
            background-color: var(--bg-alt);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 15px;
            line-height: 1.6;
        }

        .github-body pre {
            background-color: #ece8da;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }

        .github-body code {
            font-family: monospace;
            background-color: #ece8da;
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 14px;
        }

        .github-body pre code {
            padding: 0;
            background-color: transparent;
        }

        .github-body a {
            color: var(--brand-color);
        }

        .github-body img {
            max-width: 100%;
        }
    </style>
